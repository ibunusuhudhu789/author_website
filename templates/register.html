{% include "header.html" %}

<main class="page-content">
    <div class="container-sm">
        <div class="dashboard-wrap">

            <div class="dashboard-header animate-fadeup">
                <p class="section-label">Join Us</p>
                <h1 class="dashboard-title">Begin Your Journey</h1>
                <p class="dashboard-sub">Create your account to unlock dashboard access.</p>
            </div>

            <div class="dashboard-card animate-fadeup delay-2">

                {% with messages = get_flashed_messages() %}
                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-error">⚠️ {{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="post" action="/register" novalidate>

                    <div class="form-group">
                        <label class="form-label" for="regName">Your Full Name</label>
                        <input
                                class="form-control"
                                id="regName"
                                name="name"
                                type="text"
                                required
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regEmail">Email Address</label>
                        <input
                                class="form-control"
                                id="regEmail"
                                name="email"
                                type="email"
                                required
                        />
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regPassword">Choose Password</label>
                        <div style="position:relative; display:flex; align-items:center;">
                            <input
                                    class="form-control"
                                    id="regPassword"
                                    name="password"
                                    type="password"
                                    required
                                    style="padding-right:4rem;"
                            />
                        </div>
                        <div class="g-recaptcha" data-sitekey="{{ sitekey }}"></div>
                            <button
                                    type="button"
                                    onclick="togglePwd('regPassword',this)"
                                    style="
                                          position:absolute;
                                          right:1rem;
                                          background:none;
                                          border:none;
                                          cursor:pointer;
                                          color:var(--rose-deep);
                                          font-size:0.78rem;
                                          font-family:var(--font-main);
                                          font-weight:700;
                                          outline:none;
                                        "
                            >
                                Show
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100" style="margin-top:0.8rem;">
                        ✨ Create Account
                    </button>

                </form>

                <p class="auth-link">
                    Already have an account? <a href="/login">Sign in instead</a>
                </p>

            </div>

        </div>
    </div>
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
    function togglePwd(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === 'text') {
        inp.type = 'password';
        btn.innerText = 'Show';
      } else {
        inp.type = 'text';
        btn.innerText = 'Hide';
      }
    }
</script>
</body>
</html>
